<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body>
<header>
    <h3>Private Chat</h3>
    <form action="{{ url_for('logout') }}" method="get">
        <button type="submit">Logout</button>
    </form>
</header>

<div class="chat-container">
    <div id="chatBox">
        {% for msg in messages %}
        <div class="message {{ 'me' if msg.sender==session['user'] else 'other' }}">
            {{ msg.sender }}: {{ msg.text }}
        </div>
        {% endfor %}
    </div>
    <div id="inputArea">
        <input type="text" id="toUser" placeholder="Send to username..." required>
        <input type="text" id="message" placeholder="Type a message..." required>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
var socket = io();
socket.emit("join_room", { user: "{{ session['user'] }}", room: "{{ session['user'] }}" });

function sendMessage() {
    let msg = document.getElementById("message").value.trim();
    let toUser = document.getElementById("toUser").value.trim();
    if(msg === "" || toUser === "") return;
    socket.emit("send_message", { user: "{{ session['user'] }}", text: msg, room: toUser });
    let div = document.createElement("div");
    div.classList.add("message", "me");
    div.innerText = "{{ session['user'] }}: " + msg;
    document.getElementById("chatBox").appendChild(div);
    document.getElementById("message").value = "";
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
}

socket.on("receive_message", function(data){
    if(data.user !== "{{ session['user'] }}"){
        let div = document.createElement("div");
        div.classList.add("message", "other");
        div.innerText = data.user + ": " + data.text;
        document.getElementById("chatBox").appendChild(div);
        document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
    }
});
</script>
</body>
</html>
